# ============================================================
# DocFlow AI — full stack (MongoDB + API + SPA)
#
#   cp backend/.env.example backend/.env   # then fill in real secrets
#   docker compose up --build
#
#   SPA  → http://localhost:8080
#   API  → http://localhost:5000/api/v1
#
# Ports are overridable when something already owns them:
#   API_PORT=5001 WEB_PORT=8081 docker compose up
#
# NODE_ENV is inherited from backend/.env. Keep it `development` for a local
# stack: with `production`, the startup guard (correctly) refuses to boot on a
# localhost CLIENT_URL, which is all a local compose run can have.
# ============================================================

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    # Not published to the host by default — only the API needs to reach it.
    expose:
      - '27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override the .env host-facing values for the compose network.
      MONGODB_URI: mongodb://mongo:27017/docflow_ai
      PORT: '5000'
      # The SPA is served from WEB_PORT here, not Vite's 5173 — CORS must allow
      # that origin or every browser call from the compose SPA is blocked.
      CLIENT_URL: http://localhost:${WEB_PORT:-8080}
      # Nothing resolves SRV inside this network (Mongo is a plain host), and a
      # forced public resolver would only get in the way.
      DB_SRV_DNS_SERVERS: ''
      # Chromium comes from the image, not Puppeteer's download.
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    ports:
      # Host port is overridable — 5000 is often already taken (a local `npm run
      # dev`, or AirPlay on macOS). e.g. API_PORT=5001 docker compose up
      - '${API_PORT:-5000}:5000'
    depends_on:
      mongo:
        # Don't start the API until Mongo answers — otherwise the bootstrap's
        # index sync fails and the container restart-loops.
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        # Baked in at build time (Vite inlines it) — must be the URL the BROWSER
        # uses, not the compose-internal hostname. Must track API_PORT, or the
        # SPA calls a port nothing is published on.
        VITE_API_URL: http://localhost:${API_PORT:-5000}/api/v1
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-8080}:80'
    depends_on:
      - api

volumes:
  mongo-data:
