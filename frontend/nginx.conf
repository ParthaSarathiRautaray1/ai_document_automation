# Nginx config for the DocFlow AI SPA (production container).
server {
  listen       80;
  server_name  _;
  root         /usr/share/nginx/html;
  index        index.html;

  # Don't advertise the version in the Server header.
  server_tokens off;

  gzip              on;
  gzip_vary         on;
  gzip_min_length   1024;
  gzip_types        text/plain text/css application/javascript application/json image/svg+xml;

  # Hashed build assets are immutable — cache them hard.
  location /assets/ {
    expires    1y;
    add_header Cache-Control "public, immutable";
    try_files  $uri =404;
  }

  # The SPA shell must never be cached, or a deploy leaves clients on an old
  # index.html pointing at asset hashes that no longer exist.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Client-side routing: unknown paths are React Router's, not 404s.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Baseline security headers (the API sets its own).
  add_header X-Content-Type-Options "nosniff"       always;
  add_header X-Frame-Options        "DENY"          always;
  add_header Referrer-Policy        "no-referrer"   always;
}
